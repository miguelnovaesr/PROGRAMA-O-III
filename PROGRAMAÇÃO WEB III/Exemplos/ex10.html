<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Exercício JavaScript</title>
</head>
<body>

    <h2>Parte 1 - Variáveis</h2>

    <p id="info"></p>

    <hr>

    <h2>Parte 2 - Formulário</h2>

    <form id="formulario">
        <label>Nome:</label>
        <input type="text" id="nome" required>

        <br><br>

        <button type="submit">Enviar</button>
    </form>

    <h3 id="mensagem"></h3>

    <script>
        // Parte 1
        let nome = "Miguel Arcanjo";
        let curso = "GTI";

        document.getElementById("info").innerHTML =
            "Meu nome é " + nome + " e estou no curso de " + curso + ".";

        // Parte 2
        document.getElementById("formulario").addEventListener("submit", function(event) {
            event.preventDefault();

            let nomeDigitado = document.getElementById("nome").value;

            document.getElementById("mensagem").innerHTML =
                "Bem-vindo(a), " + nomeDigitado + "!<br>Você está no curso de " + curso + ".";
        });
    </script>

</body>
</html>
