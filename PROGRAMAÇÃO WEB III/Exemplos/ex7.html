<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade JavaScript</title>
</head>
<body>

    <!-- Parte 1 e 2 -->
    <h1 id="titulo">Minha Página</h1>

    <button onclick="alterarTitulo()">
        Alterar Título
    </button>

    <hr>

    <!-- Desafio -->
    <p id="texto">
        Este é um parágrafo de exemplo.
    </p>

    <button onclick="alterarTexto()">
        Alterar Texto
    </button>

    <button onclick="alterarEstilo()">
        Alterar Estilo
    </button>

    <script>

        // Parte 1 e 2
        function alterarTitulo() {
            let titulo = document.getElementById("titulo");

            titulo.innerHTML = "Bem-vindo ao JavaScript!";
            titulo.style.color = "blue";
            titulo.style.fontSize = "30px";
        }

        // Desafio - Botão 1
        function alterarTexto() {
            document.getElementById("texto").innerHTML =
                "O texto foi alterado com JavaScript!";
        }

        // Desafio - Botão 2
        function alterarEstilo() {
            let texto = document.getElementById("texto");

            texto.style.color = "white";
            texto.style.backgroundColor = "green";
            texto.style.fontSize = "25px";
        }

    </script>

</body>
</html>
