<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela Livros</title>
    <style>
        table {
            border-collapse: collapse;
            width: 70%;
            margin: 20px auto;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: lightgray;
        }
    </style>
</head>
<body>

    <h2 style="text-align:center;">Tabela Livros</h2>

    <table>
        <tr>
            <th>Código</th>
            <th>Título</th>
            <th>Autor</th>
            <th>Ano</th>
            <th>Editora</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Dom Casmurro</td>
            <td>Machado de Assis</td>
            <td>1899</td>
            <td>Garnier</td>
        </tr>
        <tr>
            <td>2</td>
            <td>O Pequeno Príncipe</td>
            <td>Antoine de Saint-Exupéry</td>
            <td>1943</td>
            <td>Reynal & Hitchcock</td>
        </tr>
    </table>

    <script>
        console.log("Tabela Livros carregada com sucesso!");
    </script>

</body>
</html>
