<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Estruturas de Repetição</title>
</head>
<body>

    <script>
        // 1. Usando for: números de 1 até 10
        document.write("<h3>For (1 até 10)</h3>");
        for (let i = 1; i <= 10; i++) {
            document.write(i + "<br>");
        }

        // 2. Usando while: contagem regressiva de 10 até 1
        document.write("<h3>While (10 até 1)</h3>");
        let contador = 10;

        while (contador >= 1) {
            document.write(contador + "<br>");
            contador--;
        }

        // 3. Usando do...while: números de 1 até 5
        document.write("<h3>Do...While (1 até 5)</h3>");
        let numero = 1;

        do {
            document.write(numero + "<br>");
            numero++;
        } while (numero <= 5);
    </script>

</body>
</html>
