<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>if else - else if - switch</title>
</head>
<body>

<script>

// Parte 1 — if/else

let idade = Number(prompt("Digite sua idade:"));

if(idade >= 18){
    document.write("Pode dirigir<br><br>");
}else{
    document.write("Não pode dirigir<br><br>");
}


// Parte 2 — else if

let nota = Number(prompt("Digite sua nota:"));

if(nota >= 7){
    document.write("Aprovado<br><br>");
}else if(nota >= 5){
    document.write("Recuperação<br><br>");
}else{
    document.write("Reprovado<br><br>");
}


// Parte 3 — switch

let dia = Number(prompt("Digite um número de 1 a 7:"));

switch(dia){

    case 1:
        document.write("Domingo");
        break;

    case 2:
        document.write("Segunda");
        break;

    case 3:
        document.write("Terça");
        break;

    case 4:
        document.write("Quarta");
        break;

    case 5:
        document.write("Quinta");
        break;

    case 6:
        document.write("Sexta");
        break;

    case 7:
        document.write("Sábado");
        break;

    default:
        document.write("Dia inválido");
}

</script>

</body>
</html>
