<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PedeAgro - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="logo-section">
            <div class="logo-wrapper">
                <img src="logo1.png" alt="PedeAgro Logo" class="main-logo">
            </div>
        </div>

        <div class="form-section">
            <div class="form-container">
                <p class="welcome">Bem vindo ao PedeAgro!</p>
                <h1>Faça seu Login</h1>
                
                <form>
                    <div class="input-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Insira seu email">
                    </div>
                    
                    <div class="input-group">
                        <label for="senha">Senha</label>
                        <input type="password" id="senha" placeholder="Insira sua senha">
                    </div>
                    
                    <button type="submit" class="btn-entrar">Entrar</button>
                </form>
                
                <p class="signup-text">
                    Ainda não possui uma conta? <a href="#">Cadastre-se</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
